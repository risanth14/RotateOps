name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  api-quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      APP_MODE: demo
      API_BASE_URL: http://localhost:4000
      WEB_BASE_URL: http://localhost:3000
      AUTH0_DOMAIN: example.auth0.com
      AUTH0_AUDIENCE: https://api.rotateops.local
      AUTH0_CLIENT_ID: test_client_id
      AUTH0_CLIENT_SECRET: test_client_secret
      AUTH0_ORG_CLAIM: org_id
      AUTH_BYPASS_DEMO: "false"
      STEP_UP_MAX_AGE_SECONDS: "900"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @rotateops/api

      - name: Lint API
        run: npm run lint --workspace @rotateops/api

      - name: Type-check API
        run: npm run typecheck --workspace @rotateops/api

      - name: Test API with coverage
        run: npm run test:coverage --workspace @rotateops/api

