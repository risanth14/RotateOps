version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rotateops
    ports:
      - "5432:5432"
    volumes:
      - rotateops-postgres:/var/lib/postgresql/data

volumes:
  rotateops-postgres:
